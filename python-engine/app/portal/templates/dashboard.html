<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaxAssistant Portal - Dashboard</title>
    <link rel="stylesheet" href="/portal/static/css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>TaxAssistant</h2>
                <span class="sidebar-badge">Portal</span>
            </div>
            <nav class="sidebar-nav">
                <a href="/portal/dashboard" class="nav-item active">
                    <span class="nav-icon">&#9635;</span> Dashboard
                </a>
                <a href="#" class="nav-item disabled">
                    <span class="nav-icon">&#9881;</span> Settings
                    <span class="nav-badge">Soon</span>
                </a>
                <a href="#" class="nav-item disabled">
                    <span class="nav-icon">&#9888;</span> Monitoring
                    <span class="nav-badge">Soon</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button id="logoutBtn" class="btn btn-sm">Logout</button>
            </div>
        </aside>

        <!-- Main content -->
        <main class="main-content">
            <header class="page-header">
                <h1>User & Growth Metrics</h1>
                <div class="header-controls">
                    <div class="date-filter">
                        <label for="startDate">From:</label>
                        <input type="date" id="startDate">
                        <label for="endDate">To:</label>
                        <input type="date" id="endDate">
                        <button id="applyFilter" class="btn btn-sm btn-primary">Apply</button>
                    </div>
                    <button id="exportCsv" class="btn btn-sm">Export CSV</button>
                </div>
            </header>

            <!-- Summary cards -->
            <section class="cards-grid">
                <div class="metric-card">
                    <div class="metric-label">Total Users</div>
                    <div class="metric-value" id="totalUsers">--</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">New Users Today</div>
                    <div class="metric-value" id="newUsersToday">--</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">DAU</div>
                    <div class="metric-value" id="dauValue">--</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">MAU</div>
                    <div class="metric-value" id="mauValue">--</div>
                </div>
            </section>

            <!-- Charts -->
            <section class="charts-grid">
                <div class="chart-card">
                    <h3>User Growth Trends</h3>
                    <canvas id="growthChart"></canvas>
                </div>
                <div class="chart-card">
                    <h3>Activity Trends (DAU)</h3>
                    <canvas id="activityChart"></canvas>
                </div>
                <div class="chart-card chart-card-half">
                    <h3>Customer Segmentation</h3>
                    <canvas id="segmentationChart"></canvas>
                </div>
            </section>
        </main>
    </div>

    <script src="/portal/static/js/dashboard.js"></script>
</body>
</html>
