name: Sync Issues to Markdown

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Export issue to markdown
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          mkdir -p docs/issues
          FILE="docs/issues/issue-${ISSUE_NUMBER}.md"
          {
            echo "# Issue #${ISSUE_NUMBER}"
            echo ""
            echo "${ISSUE_TITLE}"
            echo ""
            echo "${ISSUE_BODY}"
          } > "$FILE"

      - name: Commit and push directly to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          FILE="docs/issues/issue-${{ github.event.issue.number }}.md"
          git add "$FILE"
          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "sync: export issue #${{ github.event.issue.number }}"
            git push
          fi
