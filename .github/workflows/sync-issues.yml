name: Sync Issues to Markdown

on:
  issues:
    types: [opened, edited]

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Export issue to markdown
        run: |
          mkdir -p docs/issues
          echo "# Issue #${{ github.event.issue.number }}" > docs/issues/issue-${{ github.event.issue.number }}.md
          echo "" >> docs/issues/issue-${{ github.event.issue.number }}.md
          echo "${{ github.event.issue.title }}" >> docs/issues/issue-${{ github.event.issue.number }}.md
          echo "" >> docs/issues/issue-${{ github.event.issue.number }}.md
          echo "${{ github.event.issue.body }}" >> docs/issues/issue-${{ github.event.issue.number }}.md

      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add docs/issues
          git commit -m "sync issue ${{ github.event.issue.number }}"
          git push
