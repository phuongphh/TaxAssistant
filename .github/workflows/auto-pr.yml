name: Auto Create PR

on:
  push:
    branches:
      - "claude/**"
      
permissions:       
  contents: write
  pull-requests: write
  
jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
          base: main
          title: "Auto PR from Claude"
          body: "AI generated implementation"
