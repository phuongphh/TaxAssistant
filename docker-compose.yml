version: "3.8"

services:
  # ============================
  # Node.js Gateway Service
  # ============================
  gateway:
    build:
      context: .
      dockerfile: node-gateway/Dockerfile
    dns:
      - 8.8.8.8
      - 1.1.1.1
    dns_search:
      - .
    ports:
      - "3000:3000" # REST API
      - "3001:3001" # Webhook endpoints
    environment:
      - NODE_ENV=development
      - PORT=3000
      - WEBHOOK_PORT=3001
      - REDIS_URL=redis://redis:6379
      - POSTGRES_URL=postgresql://taxapp:taxapp_dev@postgres:5432/taxassistant
      - PYTHON_GRPC_HOST=tax-engine
      - PYTHON_GRPC_PORT=50051
      - PYTHON_REST_URL=http://tax-engine:8000
      - TELEGRAM_BOT_TOKEN=8683725208:AAHZgHtFWtWUPQwdcJiLZN0CDDDSa-Gxg2c
      - TELEGRAM_WEBHOOK_URL=${TELEGRAM_WEBHOOK_URL:-}
      - TELEGRAM_WEBHOOK_SECRET=${TELEGRAM_WEBHOOK_SECRET:-}
    # Dev mode: run TypeScript directly with hot-reload via tsx
    # (volume mount ./node-gateway/src:/app/src makes source edits live)
    command: [ "npx", "tsx", "watch", "src/index.ts" ]
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      tax-engine:
        condition: service_healthy
    volumes:
      - ./node-gateway/src:/app/src
      - ./proto:/proto
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health/live', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  # ============================
  # Python Tax Engine Service
  # ============================
  tax-engine:
    build:
      context: .
      dockerfile: python-engine/Dockerfile
    dns:
      - 8.8.8.8
      - 1.1.1.1
    dns_search:
      - .
    ports:
      - "8000:8000" # REST API
      - "50051:50051" # gRPC
    environment:
      - ENVIRONMENT=development
      - POSTGRES_URL=postgresql+asyncpg://taxapp:taxapp_dev@postgres:5432/taxassistant
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.z.ai/api/paas/v4/}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai_compatible}
      - LLM_MODEL=${LLM_MODEL:-glm-5}
      - CHROMA_PERSIST_DIR=/app/data/chroma
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./python-engine/app:/app/app
      - ./proto:/proto
      - chroma_data:/app/data/chroma
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --no-autoupdate run --token eyJhIjoiM2E0NzU4M2Q1NmUwOWJmYjhiY2FhZWZkZWJlY2I5MDkiLCJ0IjoiMmFjYWUxZGUtMGFlMC00ZWYzLWE1ODMtZmZmMTA4YTQ2MDI3IiwicyI6Ik1tUTBZV0kxTkRNdE1tVTBPUzAwWXpJMExUZ3pOell0TjJSaVlUTXdNRFk1WmpGayJ9
  # ============================
  # PostgreSQL
  # ============================
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: taxapp
      POSTGRES_PASSWORD: taxapp_dev
      POSTGRES_DB: taxassistant
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U taxapp -d taxassistant" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================
  # Redis
  # ============================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  chroma_data:
