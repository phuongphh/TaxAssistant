syntax = "proto3";

package taxassistant;

// ============================================
// Tax Assistant gRPC Service Definition
// Communication between Node.js Gateway <-> Python Engine
// ============================================

service TaxEngine {
  // Process a user's tax-related message
  rpc ProcessMessage(TaxRequest) returns (TaxResponse);

  // Stream response for long-running tax calculations
  rpc ProcessMessageStream(TaxRequest) returns (stream TaxStreamChunk);

  // Lookup tax regulation/law
  rpc LookupRegulation(RegulationQuery) returns (RegulationResponse);

  // Process uploaded tax document (invoice, receipt, etc.)
  rpc ProcessDocument(DocumentRequest) returns (DocumentResponse);

  // Customer profile management
  rpc GetOrCreateCustomer(CustomerLookup) returns (CustomerProfileMsg);
  rpc UpdateCustomerProfile(CustomerProfileUpdate) returns (CustomerProfileMsg);

  // Support case management
  rpc GetActiveCases(CustomerCaseLookup) returns (ActiveCasesResponse);
  rpc CreateSupportCase(CreateCaseRequest) returns (SupportCaseMsg);
  rpc UpdateSupportCase(UpdateCaseRequest) returns (SupportCaseMsg);
}

// ============================================
// Common Types
// ============================================

enum CustomerType {
  CUSTOMER_TYPE_UNSPECIFIED = 0;
  SME = 1;              // Small and Medium Enterprise
  HOUSEHOLD = 2;        // Hộ gia đình
  INDIVIDUAL = 3;       // Cá thể kinh doanh
}

enum TaxCategory {
  TAX_CATEGORY_UNSPECIFIED = 0;
  VAT = 1;              // Thuế GTGT
  CIT = 2;              // Thuế TNDN (Corporate Income Tax)
  PIT = 3;              // Thuế TNCN (Personal Income Tax)
  SPECIAL_CONSUMPTION = 4; // Thuế tiêu thụ đặc biệt
  IMPORT_EXPORT = 5;    // Thuế xuất nhập khẩu
  LICENSE = 6;          // Thuế môn bài
  ENVIRONMENT = 7;      // Thuế bảo vệ môi trường
}

message SessionContext {
  string session_id = 1;
  string user_id = 2;
  CustomerType customer_type = 3;
  repeated string previous_topics = 4;
  map<string, string> metadata = 5;
}

// ============================================
// Message Processing
// ============================================

message ConversationEntry {
  string role = 1;      // "user" or "assistant"
  string content = 2;
  string timestamp = 3; // ISO 8601
}

message TaxRequest {
  string request_id = 1;
  string message = 2;
  SessionContext context = 3;
  string language = 4;          // "vi" for Vietnamese
  repeated Attachment attachments = 5;
  repeated ConversationEntry conversation_history = 6;
  CustomerProfileMsg customer_profile = 7;     // Long-term customer profile
  repeated SupportCaseMsg active_cases = 8;     // Active support cases
  repeated string conversation_summaries = 9;   // Recent session summaries
}

message Attachment {
  string file_id = 1;
  string file_url = 2;
  string mime_type = 3;
  string filename = 4;
}

message TaxResponse {
  string request_id = 1;
  string reply = 2;
  repeated SuggestedAction actions = 3;
  repeated TaxReference references = 4;
  float confidence = 5;
  TaxCategory category = 6;
}

message TaxStreamChunk {
  string request_id = 1;
  string chunk = 2;
  bool is_final = 3;
  repeated SuggestedAction actions = 4;
  repeated TaxReference references = 5;
}

message SuggestedAction {
  string label = 1;             // Display text
  string action_type = 2;       // "quick_reply", "link", "document_upload"
  string payload = 3;           // Action data
}

message TaxReference {
  string title = 1;             // e.g., "Nghị định 123/2020/NĐ-CP"
  string url = 2;
  string snippet = 3;
}

// ============================================
// Regulation Lookup
// ============================================

message RegulationQuery {
  string query = 1;
  TaxCategory category = 2;
  CustomerType customer_type = 3;
  string effective_date = 4;    // ISO 8601 date
}

message RegulationResponse {
  repeated Regulation regulations = 1;
  string summary = 2;
}

message Regulation {
  string document_number = 1;   // e.g., "Thông tư 78/2021/TT-BTC"
  string title = 2;
  string content = 3;
  string effective_date = 4;
  string source_url = 5;
}

// ============================================
// Document Processing
// ============================================

message DocumentRequest {
  string request_id = 1;
  string file_url = 2;
  string mime_type = 3;
  string document_type = 4;     // "invoice", "receipt", "tax_return", etc.
  SessionContext context = 5;
}

message DocumentResponse {
  string request_id = 1;
  map<string, string> extracted_data = 2;
  string summary = 3;
  repeated string warnings = 4;
  repeated SuggestedAction actions = 5;
}

// ============================================
// Customer Profile Management
// ============================================

message CustomerProfileMsg {
  string customer_id = 1;
  string channel = 2;
  string channel_user_id = 3;
  string customer_type = 4;        // "sme" | "household" | "individual" | "unknown"
  string business_name = 5;
  string tax_code = 6;
  string industry = 7;
  string province = 8;
  string annual_revenue_range = 9;
  string employee_count_range = 10;
  string onboarding_step = 11;     // "new" | "collecting_type" | "collecting_info" | "completed"
  map<string, string> tax_profile = 12;
  repeated string recent_notes = 13;
}

message CustomerLookup {
  string channel = 1;
  string channel_user_id = 2;
}

message CustomerProfileUpdate {
  string customer_id = 1;
  map<string, string> fields = 2;  // Key-value pairs to update
}

// ============================================
// Support Case Management
// ============================================

message SupportCaseMsg {
  string case_id = 1;
  string customer_id = 2;
  string service_type = 3;
  string title = 4;
  string status = 5;               // "open" | "in_progress" | "waiting_customer" | "completed" | "cancelled"
  string current_step = 6;
  map<string, string> context = 7;
  string created_at = 8;
  string updated_at = 9;
}

message CustomerCaseLookup {
  string customer_id = 1;
}

message ActiveCasesResponse {
  repeated SupportCaseMsg cases = 1;
}

message CreateCaseRequest {
  string customer_id = 1;
  string service_type = 2;
  map<string, string> context = 3;
}

message UpdateCaseRequest {
  string case_id = 1;
  string current_step = 2;
  string status = 3;
  map<string, string> step_data = 4;
}
